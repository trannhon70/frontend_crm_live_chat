name: Deploy React Vite (Apache)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "===== START DEPLOY ====="

            cd /www/wwwroot/frontend_crm_live_chat || exit 1

            git pull origin main

            npm install
            npm run build

            # clear old files
            rm -rf /www/wwwroot/frontend_crm_live_chat/*

            # copy new build
            cp -r dist/* /www/wwwroot/frontend_crm_live_chat/

            echo "===== DEPLOY DONE ====="